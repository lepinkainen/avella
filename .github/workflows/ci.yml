name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: go-task/setup-task@v1

      - name: Test
        run: task test-ci

      - name: Lint
        run: task lint

      - name: Build
        run: task build-ci
