name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: go-task/setup-task@v1

      - name: Install tools
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Test
        run: task test-ci

      - name: Lint (goimports + go vet)
        run: |
          find . -name "*.go" -not -path "./llm-shared/*" -not -path "./tray/*" -exec goimports -w {} +
          go vet $(go list ./... | grep -v -e llm-shared -e tray)

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Build
        run: task build-ci
